<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Player HLS Simple</title>
  
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <link href="https://unpkg.com/videojs-http-source-selector/dist/videojs-http-source-selector.css" rel="stylesheet">

  <style>
    .video-js .vjs-big-play-button {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

  <video
    id="my-video"
    class="video-js vjs-default-skin"
    controls
    width="640"
    height="360">
    
    <source src="tmp_result/groovy-all-videos-and-all-audiosPlaylist.m3u8" type="application/x-mpegURL" />
  
  </video>

  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script src="https://unpkg.com/videojs-contrib-quality-levels@2.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
  <script src="https://unpkg.com/videojs-http-source-selector/dist/videojs-http-source-selector.min.js"></script>

  <script>
    var player = videojs('my-video');
    player.ready(function() {
      this.httpSourceSelector({
        default: 'auto'
      });
    });
  </script>

</body>
</html>
